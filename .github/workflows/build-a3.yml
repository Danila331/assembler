name: Build a3

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build-a3:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure MSVC x86
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Build a3.c
        shell: cmd
        run: cl /TC /W3 a3.c

      - name: Run tests
        shell: pwsh
        run: |
          $inputData = "345`n777`n0`n"
          $output = $inputData | .\a3.exe
          $output
          $text = $output -join "`n"

          if ($text -notmatch "543") {
            throw "Expected result for 345 is 543"
          }

          if ($text -notmatch "757") {
            throw "Expected result for 777 is 757"
          }
