name: Build a2

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build-a2:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure MSVC x86
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Build a2.c
        shell: cmd
        run: cl /TC /W3 a2.c

      - name: Run test 1
        shell: cmd
        run: echo 1|a2.exe

      - name: Run test 2
        shell: cmd
        run: echo 2|a2.exe
