name: Build a4

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build-a4:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure MSVC x86
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Build a4_1.c
        shell: cmd
        run: cl /TC /W3 /utf-8 a4\a4_1.c /Fe:a4_1.exe

      - name: Run tests
        shell: pwsh
        run: |
          $output = .\a4_1.exe
          $output
          $text = $output -join "`n"

          if ($text -notmatch "Количество найденных слов: 5") {
            throw "Expected 5 found words"
          }

          if ($text -notmatch "5 2 3 0 5 0 2 1 1 0") {
            throw "Expected copied words in B"
          }
